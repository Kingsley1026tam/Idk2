<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub AI App</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        #imagePreview { max-width: 300px; margin-top: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: none; }
        .container { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        #result { color: #0066cc; margin-top: 20px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>
<body>

    <div class="container">
        <h1>AI Image Classifier 🤖</h1>
        <p>Upload a photo and the AI will guess what it is!</p>
        
        <input type="file" id="imageUpload" accept="image/*">
        <br>
        
        <img id="imagePreview" crossorigin="anonymous">
        <h2 id="result"></h2>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const imagePreview = document.getElementById('imagePreview');
        const resultText = document.getElementById('result');

        // When a user uploads an image...
        imageUpload.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (file) {
                // Show the image on the screen
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'inline-block';
                    resultText.innerText = "AI is thinking... 🤔";
                    
                    // Wait a tiny bit for the image to render, then classify
                    setTimeout(classifyImage, 100);
                }
                reader.readAsDataURL(file);
            }
        });

        // The AI Brain
        async function classifyImage() {
            try {
                // Load the AI model
                const model = await mobilenet.load();
                // Look at the image and make a guess
                const predictions = await model.classify(imagePreview);
                // Show the top guess to the user
                resultText.innerText = `I'm ${Math.round(predictions[0].probability * 100)}% sure this is a ${predictions[0].className}!`;
            } catch (error) {
                resultText.innerText = "Oops! Something went wrong loading the AI.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
