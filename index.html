<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK Bus App</title>
    
    <style>
        :root {
            /* Clean White/Dark Theme */
            --bg-color: #ffffff; 
            --app-bg: #f8f9fa;
            --nav-bg: #1c1c1c; 
            --active-color: #1c1c1c; /* Dark bubble for active nav */
            --text-color: #1c1c1c;
            --text-muted: #6c757d;
            
            /* Company Colors */
            --kmb-color: #ed1d24;
            --ctb-color: #fccc0a;
            --ctb-text: #00558e;
            --nlb-color: #007a61;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden; color: var(--text-color);
        }

        .app-container {
            width: 100%; max-width: 400px; height: 100dvh;
            background-color: var(--app-bg);
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* --- Pages --- */
        .page {
            display: none; flex: 1; flex-direction: column;
            padding: 20px; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 90px;
        }
        .page.active { display: flex; }
        .page::-webkit-scrollbar { display: none; }
        .page { -ms-overflow-style: none; scrollbar-width: none; }

        h1 { font-size: 28px; margin-bottom: 5px; font-weight: 800; letter-spacing: -0.5px; }
        .sub-title { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }

        /* --- Native Search Input --- */
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; flex-shrink: 0; }
        .search-container input {
            flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #e0e0e0;
            font-size: 18px; font-weight: bold; text-transform: uppercase;
            background: #fff; outline: none; transition: border 0.2s;
        }
        .search-container input:focus { border-color: var(--text-color); }
        .search-container button {
            padding: 0 20px; border-radius: 12px; border: none;
            background: var(--text-color); color: white; font-weight: bold;
            font-size: 16px; cursor: pointer;
        }

        /* --- Home List View --- */
        .route-list { display: flex; flex-direction: column; gap: 10px; }
        .route-list-item {
            background: #fff; padding: 15px; border-radius: 12px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: 1px solid #f0f0f0;
            cursor: pointer; transition: transform 0.1s, background 0.2s;
        }
        .route-list-item:active { transform: scale(0.98); background: #f8f9fa; }
        .route-badge {
            background: var(--text-color); color: #fff; font-weight: bold;
            padding: 8px 12px; border-radius: 8px; min-width: 55px; text-align: center;
        }
        .route-info { flex: 1; }
        .route-dest { font-size: 15px; font-weight: 600; }
        .route-orig { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        /* --- Route Cards (Search Results) --- */
        .route-card {
            background: #fff; border-radius: 15px; padding: 15px;
            margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .route-header {
            font-size: 22px; font-weight: 800; margin-bottom: 15px;
            padding-bottom: 10px; border-bottom: 1px solid #eee; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .company-badge { font-size: 12px; padding: 4px 10px; border-radius: 6px; color: white; font-weight: bold;}
        
        .direction-box {
            padding: 15px; border-radius: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            color: white; font-weight: bold;
        }
        .direction-box:last-child { margin-bottom: 0; }
        .stop-name { font-size: 13px; font-weight: normal; opacity: 0.9; margin-top: 4px;}
        .eta-time { font-size: 24px; text-align: right;}

        /* Company Backgrounds */
        .bg-kmb { background-color: var(--kmb-color); }
        .bg-ctb { background-color: var(--ctb-color); color: var(--ctb-text); }
        .bg-nlb { background-color: var(--nlb-color); }

        /* --- Navigation --- */
        .nav-container {
            position: absolute; bottom: 0; width: 100%; padding: 0 20px 20px 20px;
            background: transparent; z-index: 10;
        }
        .nav-bar {
            position: relative; background: var(--nav-bg); height: 70px;
            border-radius: 25px; display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .nav-item {
            width: 60px; height: 60px; display: flex; justify-content: center; align-items: center;
            z-index: 2; cursor: pointer; color: #888; transition: 0.3s;
        }
        .nav-item svg { width: 26px; height: 26px; fill: currentColor; }
        .nav-item.active { color: #fff; transform: translateY(-22px); }
        .indicator {
            position: absolute; top: -22px; width: 60px; height: 60px;
            background: var(--active-color); border-radius: 50%;
            border: 8px solid var(--app-bg); transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="page-home" class="page active">
        <h1>Directory</h1>
        <p class="sub-title">Select a route to view stations & ETAs</p>
        <div id="home-content" class="route-list">
            <p style="text-align:center; padding: 20px; color: var(--text-muted);">Loading routes...</p>
        </div>
    </div>

    <div id="page-search" class="page">
        <h1>Station ETA</h1>
        <p class="sub-title">Live arrivals by company</p>
        
        <div class="search-container">
            <input type="text" id="routeInput" placeholder="Route (e.g. 1, 112, 1A)" enterkeyhint="search">
            <button onclick="executeSearch()">Find</button>
        </div>
        
        <div id="search-results">
            <p style="text-align:center; color: var(--text-muted); margin-top: 30px;">Search a route to see live data</p>
        </div>
    </div>

    <div id="page-settings" class="page">
        <h1>Settings</h1>
        <p class="sub-title">App Configuration</p>
        <div class="route-card" style="background: #fff;">
            <p style="padding: 10px 0; color: #333;"><strong>Theme:</strong> Clean White & Dark</p>
            <hr style="border:0; border-top:1px solid #eee;">
            <p style="padding: 10px 0; color: #333;"><strong>API Separation:</strong> Enabled (Prevents Route 1 conflict)</p>
        </div>
    </div>

    <div class="nav-container">
        <div class="nav-bar">
            <div class="indicator" id="indicator"></div>
            
            <div class="nav-item active" onclick="switchPage('home', this)">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
            <div class="nav-item" onclick="switchPage('search', this)">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>
            <div class="nav-item" onclick="switchPage('settings', this)">
                <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Navigation ---
    function switchPage(pageId, element) {
        if(element) {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('indicator').style.left = `${element.offsetLeft}px`;
        }
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(`page-${pageId}`).classList.add('active');
    }

    // --- Open Route from List ---
    function openRoute(routeNo) {
        document.getElementById('routeInput').value = routeNo;
        switchPage('search', document.querySelectorAll('.nav-item')[1]);
        executeSearch();
    }

    // --- On Load: Fetch Routes for Vertical List ---
    window.onload = async () => {
        const activeItem = document.querySelector('.nav-item.active');
        document.getElementById('indicator').style.left = `${activeItem.offsetLeft}px`;

        try {
            const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/route/');
            const data = await res.json();
            if(data && data.data) {
                // Deduplicate and render as a vertical list
                let seen = new Set();
                let uniqueRoutes = data.data.filter(r => {
                    if (seen.has(r.route)) return false;
                    seen.add(r.route);
                    return true;
                }).slice(0, 50); // Top 50 to prevent DOM lag

                document.getElementById('home-content').innerHTML = uniqueRoutes.map(r => `
                    <div class="route-list-item" onclick="openRoute('${r.route}')">
                        <div class="route-badge">${r.route}</div>
                        <div class="route-info">
                            <div class="route-dest">To ${r.dest_tc}</div>
                            <div class="route-orig">From ${r.orig_tc}</div>
                        </div>
                    </div>
                `).join('') + '<p style="text-align:center; padding: 20px; font-size:12px; color:#888;">Showing top 50 routes</p>';
            }
        } catch(e) {
            document.getElementById('home-content').innerHTML = "<p style='text-align:center; color:red;'>Failed to load directory.</p>";
        }

        // Enter key listener
        document.getElementById('routeInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.activeElement.blur();
                executeSearch();
            }
        });
    };

    // --- Search Logic (Separate Cards for Conflicting Routes) ---
    async function executeSearch() {
        const route = document.getElementById('routeInput').value.trim().toUpperCase();
        const resultsDiv = document.getElementById('search-results');
        
        if (!route) return;

        resultsDiv.innerHTML = `<p style="text-align:center; font-weight:bold; color: var(--text-color);">Fetching Live ETA...</p>`;

        try {
            // Fetch KMB
            let kmbData = null;
            try {
                let kmbRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${route}/1`).then(r=>r.json());
                if (kmbRes.data && kmbRes.data.length > 0) kmbData = kmbRes.data;
            } catch(e) {}

            // Fetch CTB
            let ctbData = null;
            try {
                let ctbStopsOut = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${route}/outbound`).then(r => r.json());
                let ctbStopsIn = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${route}/inbound`).then(r => r.json());
                
                let stopsToCheck = [];
                if(ctbStopsOut.data && ctbStopsOut.data.length > 0) stopsToCheck.push(ctbStopsOut.data[0].stop);
                if(ctbStopsIn.data && ctbStopsIn.data.length > 0) stopsToCheck.push(ctbStopsIn.data[0].stop);

                if(stopsToCheck.length > 0) {
                    ctbData = [];
                    for(let stop of stopsToCheck) {
                        let etaRes = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${stop}/${route}`).then(r => r.json());
                        if(etaRes.data) ctbData = ctbData.concat(etaRes.data);
                    }
                }
            } catch(e) {}

            // Fetch NLB
            let nlbData = null;
            try {
                let nlbRoutes = await fetch(`https://rt.data.gov.hk/v2/transport/nlb/route.php?action=list`).then(r => r.json());
                let matchedNlbRoute = nlbRoutes.routes.find(r => r.routeNo === route);
                
                if (matchedNlbRoute) {
                    let routeId = matchedNlbRoute.routeId;
                    let stops = await fetch(`https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=list&routeId=${routeId}`).then(r=>r.json());
                    if(stops.stops && stops.stops.length > 0) {
                        let firstStop = stops.stops[0].stopId;
                        let etaRes = await fetch(`https://rt.data.gov.hk/v2/transport/nlb/eta.php?action=list&routeId=${routeId}&stopId=${firstStop}`).then(r=>r.json());
                        if(etaRes.estimatedArrivals) {
                            nlbData = etaRes.estimatedArrivals.map(eta => {
                                return { dest_tc: matchedNlbRoute.routeName_c.split('>')[1] || "NLB Dest", eta: eta.estimatedArrivalTime, dir: "O" };
                            });
                        }
                    }
                }
            } catch(e) {}

            let finalHTML = "";

            // Helper function to build a card for a specific company
            const buildCompanyCard = (dataList, companyClass, companyName) => {
                if (!dataList || dataList.length === 0) return "";

                let dir1 = { dest: "Unknown", eta: 999, stopName: "" };
                let dir2 = { dest: "Unknown", eta: 999, stopName: "" };
                const now = new Date();

                dataList.forEach(item => {
                    if (!item.eta) return;
                    let etaTime = new Date(item.eta);
                    let diffMins = Math.round((etaTime - now) / 60000);
                    if (diffMins < 0) return;

                    let destName = item.dest_tc || item.dest_en || item.dest;
                    let dirCode = item.dir || "O"; 

                    if (dirCode === 'O') {
                        if (diffMins < dir1.eta) { dir1.eta = diffMins; dir1.dest = destName; dir1.stopName = "Nearest Station"; }
                    } else {
                        if (diffMins < dir2.eta) { dir2.eta = diffMins; dir2.dest = destName; dir2.stopName = "Nearest Station"; }
                    }
                });

                if (dir1.eta === 999 && dir2.eta === 999) return ""; // No active buses

                let html = `
                    <div class="route-card">
                        <div class="route-header">
                            <span>Route ${route}</span>
                            <span class="company-badge ${companyClass}">${companyName}</span>
                        </div>
                `;
                if (dir1.eta !== 999) html += createDirectionBox(dir1, companyClass);
                if (dir2.eta !== 999) html += createDirectionBox(dir2, companyClass);
                html += `</div>`;
                return html;
            };

            // Build separate cards for each company (Solves the Route 1 conflict perfectly)
            finalHTML += buildCompanyCard(kmbData, "bg-kmb", "KMB");
            finalHTML += buildCompanyCard(ctbData, "bg-ctb", "CTB");
            finalHTML += buildCompanyCard(nlbData, "bg-nlb", "NLB");

            if (finalHTML === "") {
                resultsDiv.innerHTML = `<p style="text-align:center; padding: 20px; background: #f8f9fa; border-radius: 12px; color: var(--text-muted);">Route ${route} not found or no active buses.</p>`;
            } else {
                resultsDiv.innerHTML = finalHTML;
            }

        } catch (error) {
            resultsDiv.innerHTML = `<p style="text-align:center; color: red;">Error processing data.</p>`;
        }
    }

    function createDirectionBox(dirObj, bgClass) {
        let timeStr = dirObj.eta === 0 ? "Arriving" : `${dirObj.eta} min`;
        return `
            <div class="direction-box ${bgClass}">
                <div>
                    <div style="font-size:16px;">To ${dirObj.dest}</div>
                    <div class="stop-name">via ${dirObj.stopName}</div>
                </div>
                <div class="eta-time">${timeStr}</div>
            </div>
        `;
    }
</script>

</body>
</html>
