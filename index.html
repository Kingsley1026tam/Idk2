<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HK Bus Plus</title>
    
    <link rel="icon" type="image/png" href="AppIcon.png">
    <link rel="apple-touch-icon" href="AppIcon.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --app-bg: #f2f2f6; 
            --box-bg: #ffffff;
            --text-main: #000000;
            --text-muted: #8e8e93;
            --border-color: #e5e5ea;
            --kmb-red: #ed1d24;
            --lwb-orange: #f39800;
            --ctb-yellow: #fff200;
            --ctb-blue: #00558e;
            --nlb-green: #007a61;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang HK", sans-serif; }

        body {
            background-color: #000; display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden;
        }

        .app-container {
            width: 100%; max-width: 500px; height: 100dvh;
            background-color: var(--app-bg);
            display: flex; flex-direction: column; position: relative;
        }

        /* --- Header --- */
        .app-header {
            background: var(--box-bg); padding: 55px 15px 15px 15px; 
            border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        .app-header h1 { font-size: 26px; font-weight: 800; }

        .page { display: none; flex: 1; flex-direction: column; overflow: hidden; padding-bottom: 75px; }
        .page.active { display: flex; }
        
        .scrollable-content { flex: 1; overflow-y: auto; padding: 10px; }
        .section-title { font-size: 18px; font-weight: 700; margin: 15px 5px 10px 5px; color: var(--text-main); }

        /* --- Route Cards --- */
        .route-item {
            background: var(--box-bg); border-radius: 14px; padding: 15px;
            display: flex; align-items: center; gap: 12px; cursor: pointer;
            margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .route-item:active { background: #f2f2f2; }
        
        .route-badge {
            color: #fff; font-size: 17px; font-weight: 800;
            padding: 8px 4px; border-radius: 10px; min-width: 65px; text-align: center;
        }
        
        .badge-kmb { background-color: var(--kmb-red); }
        .badge-lwb { background-color: var(--lwb-orange); }
        .badge-ctb { background-color: var(--ctb-yellow); color: var(--ctb-blue); border: 1px solid #eee; }
        .badge-nlb { background-color: var(--nlb-green); }

        .route-info { flex: 1; }
        .route-dest { font-size: 15px; font-weight: 600; color: #333; }
        .route-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        /* --- Search Bar --- */
        .search-box { padding: 12px; background: var(--box-bg); border-bottom: 1px solid var(--border-color); }
        .search-input-wrapper {
            display: flex; background: #e9e9eb; border-radius: 10px; padding: 10px 12px; align-items: center;
        }
        .search-input-wrapper input {
            flex: 1; border: none; background: transparent; font-size: 17px; outline: none; margin-left: 8px; text-transform: uppercase;
        }

        /* --- Map & Details --- */
        #map { width: 100%; height: 35vh; flex-shrink: 0; }
        .back-bar { padding: 10px; background: white; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .back-btn { background: #f2f2f2; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; height: 75px;
            background: rgba(255, 255, 255, 0.92); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; padding-bottom: 20px;
            backdrop-filter: blur(20px); z-index: 100;
        }
        .nav-tab { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); flex: 1; cursor: pointer; }
        .nav-tab.active { color: var(--kmb-red); }
        .nav-tab svg { width: 26px; height: 26px; fill: currentColor; }
        .nav-tab span { font-size: 10px; margin-top: 4px; font-weight: 600; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="page-home" class="page active">
        <div class="app-header"><h1>HK Bus</h1></div>
        <div class="scrollable-content">
            <h2 class="section-title">📍 Nearby</h2>
            <div id="nearby-list"><p style="padding:10px; color:#888;">Searching for GPS...</p></div>
            
            <h2 class="section-title">🚌 All Routes</h2>
            <div id="all-routes-list"><p style="padding:10px; color:#888;">Loading database...</p></div>
        </div>
    </div>

    <div id="page-search" class="page">
        <div class="app-header"><h1>Search</h1></div>
        <div class="search-box">
            <div class="search-input-wrapper">
                <svg viewBox="0 0 24 24" width="18" fill="#8e8e93"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="searchInput" placeholder="Route No. (Enter to Search)" autocomplete="off">
            </div>
        </div>
        <div class="scrollable-content" id="search-results">
            <p style="text-align:center; padding: 40px; color: #888;">Enter route and press Enter</p>
        </div>
    </div>

    <div id="page-details" class="page">
        <div class="back-bar">
            <button class="back-btn" onclick="showPage('home')">Back</button>
            <div id="details-title" style="font-weight:700; font-size:14px;"></div>
        </div>
        <div id="map"></div>
        <div class="scrollable-content" id="details-list"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-tab active" id="tab-home" onclick="showPage('home')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </div>
        <div class="nav-tab" id="tab-search" onclick="showPage('search')">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>Search</span>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let allRoutesStore = [];
    let map = null;

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        if(id !== 'details') document.getElementById('tab-' + id).classList.add('active');
    }

    // --- Resilient Route Loader (Fixes the Stuck Loading issue) ---
    async function loadDatabase() {
        try {
            // We use Promise.allSettled so if ONE fails, the rest still load!
            const fetchKMB = fetch('https://data.etabus.gov.hk/v1/transport/kmb/route/').then(r => r.json());
            const fetchCTB = fetch('https://rt.data.gov.hk/v1/transport/citybus-nwfb/route/ctb').then(r => r.json());
            const fetchNLB = fetch('https://rt.data.gov.hk/v1/transport/nlb/route.php?action=list').then(r => r.json());

            const results = await Promise.allSettled([fetchKMB, fetchCTB, fetchNLB]);

            const [kmbRes, ctbRes, nlbRes] = results;

            // Load KMB/LWB if successful
            if (kmbRes.status === 'fulfilled' && kmbRes.value.data) {
                kmbRes.value.data.forEach(r => {
                    const isLWB = ['A','E','NA','R','S','X'].some(p => r.route.startsWith(p));
                    allRoutesStore.push({ no: r.route, dest: r.dest_tc, orig: r.orig_tc, co: 'KMB/LWB', badge: isLWB ? 'badge-lwb' : 'badge-kmb', dir: r.bound });
                });
            }

            // Load CTB if successful
            if (ctbRes.status === 'fulfilled' && ctbRes.value.data) {
                ctbRes.value.data.forEach(r => {
                    allRoutesStore.push({ no: r.route, dest: r.dest_tc, orig: r.orig_tc, co: 'CTB', badge: 'badge-ctb', dir: r.dir });
                });
            }

            // Load NLB if successful
            if (nlbRes.status === 'fulfilled' && nlbRes.value.routes) {
                nlbRes.value.routes.forEach(r => {
                    allRoutesStore.push({ no: r.routeNo, dest: r.routeName_tc.split('>')[1] || r.routeName_tc, orig: r.routeName_tc.split('>')[0], co: 'NLB', badge: 'badge-nlb', dir: '1' });
                });
            }

            // Populate "All Routes" on home
            const allList = document.getElementById('all-routes-list');
            if (allRoutesStore.length > 0) {
                allList.innerHTML = allRoutesStore.slice(0, 50).map(r => renderItem(r)).join('');
            } else {
                allList.innerHTML = '<p style="padding:10px; color:red;">Failed to connect to government servers. Please check your internet.</p>';
            }

        } catch (e) {
            console.error("Database failed", e);
            document.getElementById('all-routes-list').innerHTML = '<p style="padding:10px; color:red;">System Error. Please refresh the page.</p>';
        }
    }

    function renderItem(r) {
        return `
            <div class="route-item" onclick="openDetails('${r.no}', '${r.co}', '${r.dir}', '${r.dest}')">
                <div class="route-badge ${r.badge}">${r.no}</div>
                <div class="route-info">
                    <div class="route-dest">往 ${r.dest}</div>
                    <div class="route-sub">${r.co} • 由 ${r.orig}</div>
                </div>
            </div>`;
    }

    function performSearch() {
        const query = document.getElementById('searchInput').value.toUpperCase().trim();
        const results = document.getElementById('search-results');
        if(!query) return;

        const filtered = allRoutesStore.filter(r => r.no === query);
        results.innerHTML = filtered.length ? filtered.map(r => renderItem(r)).join('') : '<p style="text-align:center; padding:20px;">No results found.</p>';
    }

    // --- GPS Nearby Logic ---
    async function initNearby(lat, lon) {
        const nearbyDiv = document.getElementById('nearby-list');
        try {
            // Quick fallback text for nearby routes (expand this later with real coordinates logic)
            if(allRoutesStore.length > 0) {
                 nearbyDiv.innerHTML = `<p style="font-size:12px; color:#888; padding: 5px;">GPS Active</p>` + 
                                       allRoutesStore.slice(10, 15).map(r => renderItem(r)).join('');
            } else {
                 nearbyDiv.innerHTML = '<p style="padding:10px; color:#888;">Routes not loaded yet.</p>';
            }
        } catch (e) {
            nearbyDiv.innerHTML = '<p>GPS data unavailable.</p>';
        }
    }

    async function openDetails(no, co, dir, dest) {
        showPage('details');
        document.getElementById('details-title').innerText = `${no} 往 ${dest}`;
        const list = document.getElementById('details-list');
        list.innerHTML = '<p style="padding:20px;">Fetching Live ETA...</p>';

        if(!map) {
            map = L.map('map', {zoomControl: false}).setView([22.35, 114.1], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        try {
            if(co === 'KMB/LWB') {
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${no}/1`);
                const data = await res.json();
                list.innerHTML = data.data.slice(0, 12).map(e => `
                    <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; background:white;">
                        <span style="font-weight:500;">${e.dest_tc}</span>
                        <b style="color:var(--kmb-red)">${e.eta ? Math.round((new Date(e.eta)-new Date())/60000)+' min' : '---'}</b>
                    </div>
                `).join('');
            } else {
                list.innerHTML = `<p style="padding:20px; color:#888;">Live ETA for ${co} requires fetching specific company endpoints.</p>`;
            }
        } catch(e) { list.innerHTML = '<p style="padding:20px; color:red;">Error loading ETA</p>'; }
    }

    // --- Listeners ---
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            performSearch();
            e.target.blur();
        }
    });

    window.onload = () => {
        loadDatabase();
        navigator.geolocation.getCurrentPosition(
            p => setTimeout(() => initNearby(p.coords.latitude, p.coords.longitude), 1000), // Delay slightly so routes store is populated
            e => { document.getElementById('nearby-list').innerHTML = '<p style="font-size:12px; color:#888; padding:10px;">Location access denied.</p>'; }
        );
    };
</script>

</body>
</html>
