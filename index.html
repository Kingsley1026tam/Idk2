<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HKBusEta</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="favicon.ico">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #F7F7F9;        
            --surface-color: #FFFFFF;   
            --text-primary: #1D1D1F;    
            --text-secondary: #86868B;
            --brand-color: #FFCC00;     
            --brand-light: rgba(255, 204, 0, 0.15);     
            --brand-text: #1D1D1F;      
            --border-soft: #F0F0F2;
            --nav-bg: #FFFFFF;
            --nav-icon: #A1A1A6;
            
            --safe-top: env(safe-area-inset-top, 45px);
            --safe-bottom: env(safe-area-inset-bottom, 24px);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --surface-color: #1E1E1E;
                --text-primary: #FFFFFF;    
                --text-secondary: #98989D;
                --brand-color: #FFD60A; 
                --brand-light: rgba(255, 214, 10, 0.15);
                --brand-text: #FFFFFF;      
                --border-soft: #2C2C2E;
                --nav-bg: #1E1E1E;
                --nav-icon: #636366;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "PingFang HK", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-primary); height: 100dvh; overflow: hidden; transition: background-color 0.4s ease; }

        .app-container { width: 100%; height: 100dvh; display: flex; flex-direction: column; position: relative; }

        .header-section {
            padding: calc(var(--safe-top) + 20px) 24px 16px 24px;
            background: linear-gradient(180deg, var(--bg-color) 70%, rgba(247,247,249,0) 100%);
            z-index: 10; flex-shrink: 0;
        }
        @media (prefers-color-scheme: dark) {
            .header-section { background: linear-gradient(180deg, var(--bg-color) 70%, rgba(18,18,18,0) 100%); }
        }
        
        .greeting { font-size: 15px; color: var(--text-secondary); font-weight: 600; margin-bottom: 4px; display: block; }
        .header-section h1 { font-size: 34px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 20px; }
        
        .search-box {
            display: flex; align-items: center; background: var(--surface-color); 
            border: 1px solid var(--border-soft);
            border-radius: 20px; padding: 14px 20px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.03);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .search-box:focus-within {
            border-color: var(--brand-color);
            box-shadow: 0 12px 32px var(--brand-light);
            transform: translateY(-2px);
        }
        .search-box svg { fill: var(--text-secondary); width: 22px; height: 22px; }
        .search-box input { 
            flex: 1; border: none; background: transparent; font-size: 17px; 
            color: var(--text-primary); outline: none; margin-left: 12px; font-weight: 500;
        }
        .search-box input::placeholder { color: var(--text-secondary); font-weight: 400; }

        .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .page.active { display: flex; animation: pageIn 0.3s ease-out forwards; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .scrollable-content { 
            flex: 1; overflow-y: auto; padding: 10px 24px calc(120px + var(--safe-bottom)) 24px; 
            scroll-behavior: smooth;
        }
        .scrollable-content::-webkit-scrollbar { display: none; }

        .route-item { 
            background: var(--surface-color); border-radius: 24px; padding: 20px; 
            display: flex; align-items: center; gap: 18px; margin-bottom: 16px; 
            cursor: pointer; border: 1px solid var(--border-soft);
            box-shadow: 0 4px 16px rgba(0,0,0,0.02);
            opacity: 0; transform: translateY(15px);
            animation: slideUpFade 0.4s ease-out forwards;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
        }
        .route-item:active { transform: scale(0.96); }
        
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
        
        .route-badge { 
            color: #fff; font-size: 19px; font-weight: 800; 
            min-width: 68px; height: 48px; display: flex; align-items: center; justify-content: center; 
            border-radius: 16px; padding: 0 10px;
        }
        .badge-kmb { background: linear-gradient(135deg, #E63946, #D0202E); }
        .badge-lwb { background: linear-gradient(135deg, #FFAA00, #F39800); }
        .badge-ctb { background: linear-gradient(135deg, #FFF64D, #FFF200); color: #00558e; border: 1px solid rgba(0,0,0,0.05); }
        
        .route-info { flex: 1; }
        .route-dest { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
        .route-sub { font-size: 14px; color: var(--text-secondary); margin-top: 6px; font-weight: 500; display: flex; align-items: center; gap: 6px; }

        .back-bar { 
            padding: calc(var(--safe-top) + 15px) 24px 15px; background: var(--bg-color); 
            display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }
        .back-btn { 
            background: var(--surface-color); border: 1px solid var(--border-soft); 
            color: var(--text-primary); font-size: 15px; font-weight: 600; 
            padding: 8px 16px; border-radius: 20px; cursor: pointer; 
            display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }
        .back-btn:active { transform: scale(0.9); }
        .back-btn svg { width: 16px; height: 16px; }
        #details-title { font-size: 18px; font-weight: 800; }
        
        #map { width: 100%; height: 35vh; border-radius: 0 0 32px 32px; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 10; position: relative;}
        
        .stop-list-wrapper { flex: 1; overflow-y: auto; padding: 20px 24px calc(120px + var(--safe-bottom)); }
        
        .stop-container { 
            background: var(--surface-color); border-radius: 20px; margin-bottom: 12px;
            border: 1px solid var(--border-soft); padding: 18px 20px;
            display: flex; justify-content: space-between; align-items: center;
            opacity: 0; transform: translateY(10px);
            animation: slideUpFade 0.4s ease-out forwards;
        }
        .stop-name { font-weight: 600; font-size: 16px; letter-spacing: -0.2px; line-height: 1.4; max-width: 70%; }
        .stop-eta { font-weight: 800; font-size: 16px; background: var(--brand-color); color: var(--brand-text); padding: 6px 12px; border-radius: 12px; text-align: center;}
        .stop-eta.far { background: transparent; color: var(--text-secondary); padding: 0; text-align: right;}

        .bottom-nav-wrapper {
            position: absolute; bottom: 0; left: 0; right: 0; 
            height: calc(85px + var(--safe-bottom));
            z-index: 1000; pointer-events: none;
        }
        
        .nav-bg-shape {
            position: absolute; bottom: 0; width: 100%; height: calc(75px + var(--safe-bottom));
            background: var(--nav-bg); pointer-events: auto;
            border-top: 1px solid var(--border-soft);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.04);
            border-radius: 30px 30px 0 0; 
        }
        
        .nav-tabs {
            position: absolute; top: 10px; left: 0; right: 0; height: 65px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1010; pointer-events: auto;
        }
        
        .nav-tab { 
            flex: 1; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
        }
        .nav-tab svg { width: 26px; height: 26px; fill: var(--nav-icon); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .nav-tab span { font-size: 12px; font-weight: 600; color: var(--nav-icon); margin-top: 6px; transition: opacity 0.3s; }
        
        .nav-tab.active svg { transform: translateY(-24px) scale(1.1); fill: var(--brand-text); }
        .nav-tab.active span { opacity: 0; }

        .nav-indicator {
            position: absolute; top: -16px; width: 76px; height: 52px; background: var(--brand-color); 
            border-radius: 20px; border: 8px solid var(--bg-color); left: 0; 
            transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1005; pointer-events: auto; box-shadow: 0 8px 20px var(--brand-light);
        }

        .status-text { text-align: center; color: var(--text-secondary); padding: 40px 20px; font-size: 15px; font-weight: 500; line-height: 1.6; }
        .status-icon { font-size: 40px; margin-bottom: 12px; display: block; }
        .status-icon.bouncing { animation: bounce 0.8s infinite alternate cubic-bezier(0.5, 0.05, 1, 0.5); }
        @keyframes bounce { 0% { transform: translateY(0) scaleY(0.95); } 100% { transform: translateY(-10px) scaleY(1.05); } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="page-home" class="page active">
        <div class="header-section">
            <span class="greeting" id="greeting-text">早晨</span>
            <h1>去邊度好呢？</h1>
            <div class="search-box">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="routeSearch" placeholder="試試輸入 101 或 968..." oninput="filterRoutes()">
            </div>
        </div>
        <div class="scrollable-content" id="main-list">
            <div class="status-text"><span class="status-icon bouncing">☕️</span>稍等一下<br>正在為你整理最新的巴士資料...</div>
        </div>
    </div>

    <div id="page-details" class="page">
        <div class="back-bar">
            <button class="back-btn" onclick="showPage('home', 0)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>返回列表
            </button>
            <div id="details-title"></div>
            <div style="width: 80px;"></div>
        </div>
        <div id="map"></div>
        <div class="stop-list-wrapper" id="details-list"></div>
    </div>

    <div class="bottom-nav-wrapper">
        <div class="nav-bg-shape"></div>
        <div class="nav-indicator" id="nav-ind"></div>
        <div class="nav-tabs">
            <div class="nav-tab active" id="tab-0" onclick="showPage('home', 0)">
                <svg viewBox="0 0 24 24"><path d="M12 2c-4.97 0-9 4.03-9 9 0 4.17 2.84 7.67 6.69 8.69L12 22l2.31-2.31C18.16 18.67 21 15.17 21 11c0-4.97-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
                <span>探索路線</span>
            </div>
            <div class="nav-tab" id="tab-1" onclick="if(currentIdx>-1) showPage('details', 1)">
                <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
                <span>車站地圖</span>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let allRoutes = [], currentIdx = 0;
    let map = null, polyline = null, mapMarkers = L.layerGroup();

    function setGreeting() {
        const hour = new Date().getHours();
        const textEl = document.getElementById('greeting-text');
        if (hour >= 5 && hour < 12) textEl.innerText = "早晨！美好的一天 ☀️";
        else if (hour >= 12 && hour < 18) textEl.innerText = "午安！出門順利 ☁️";
        else textEl.innerText = "晚上好！早點休息 🌙";
    }

    function formatEta(etaStr) {
        if (!etaStr) return { label: '未有資料', isNear: false };
        const diff = (new Date(etaStr) - new Date()) / 60000;
        if (diff <= 1.5 && diff >= -1) return { label: '即將到達', isNear: true };
        const min = Math.round(diff);
        return { label: min > 0 ? `約 ${min} 分鐘` : '剛開走', isNear: false };
    }

    async function init() {
        setGreeting();
        setTimeout(() => moveIndicator(0), 50); 
        
        try {
            const kmbReq = fetch('https://data.etabus.gov.hk/v1/transport/kmb/route/').then(r => r.json());
            const ctbReq = fetch('https://rt.data.gov.hk/v2/transport/citybus/route/ctb').then(r => r.json());
            
            const [kmbRes, ctbRes] = await Promise.allSettled([kmbReq, ctbReq]);

            if (kmbRes.status === 'fulfilled' && kmbRes.value.data) {
                kmbRes.value.data.forEach(r => allRoutes.push({ no: r.route, dest: r.dest_tc, orig: r.orig_tc, co: 'KMB', badge: r.route.match(/^[A|E|NA|R|S|X]/) ? 'badge-lwb' : 'badge-kmb', dir: r.bound, stype: r.service_type }));
            }
            if (ctbRes.status === 'fulfilled' && ctbRes.value.data) {
                // 【修復 3：城巴 API 不回傳來回程方向，我們手動為每一條線建立去程與回程】
                ctbRes.value.data.forEach(r => {
                    allRoutes.push({ no: r.route, dest: r.dest_tc, orig: r.orig_tc, co: 'CTB', badge: 'badge-ctb', dir: 'outbound' });
                    allRoutes.push({ no: r.route, dest: r.orig_tc, orig: r.dest_tc, co: 'CTB', badge: 'badge-ctb', dir: 'inbound' });
                });
            }

            if (allRoutes.length === 0) throw new Error("No data");
            renderList(allRoutes);
        } catch(e) { 
            document.getElementById('main-list').innerHTML = `<div class="status-text"><span class="status-icon bouncing">🥺</span>網絡好像有點問題<br>請檢查連線後再試一次。</div>`; 
        }
    }

    function renderList(list) {
        const container = document.getElementById('main-list');
        if(!list.length) { 
            container.innerHTML = `<div class="status-text"><span class="status-icon">🤔</span>找不到相關路線</div>`; 
            return; 
        }
        
        const displayList = list.slice(0, 100);
        
        let html = displayList.map((r, i) => `
            <div class="route-item" style="animation-delay: ${Math.min(i * 0.015, 0.4)}s" onclick="openRoute('${r.no}', '${r.co}', '${r.dir}', '${r.stype}', '${r.dest}')">
                <div class="route-badge ${r.badge}">${r.no}</div>
                <div class="route-info">
                    <div class="route-dest">前往 ${r.dest}</div>
                    <div class="route-sub"><span style="background:var(--border-soft); padding:2px 6px; border-radius:6px; font-size:11px;">${r.co}</span> 從 ${r.orig} 出發</div>
                </div>
            </div>`).join('');
            
        if (list.length > 100) {
            html += `<div class="status-text" style="padding-top:10px;">請使用上方搜尋框尋找其他路線 🔍</div>`;
        }
        container.innerHTML = html;
    }

    function filterRoutes() {
        const q = document.getElementById('routeSearch').value.toUpperCase().trim();
        if (!q) { renderList(allRoutes); return; }
        const filtered = allRoutes.filter(r => r.no.includes(q) || r.dest.includes(q));
        renderList(filtered);
    }

    async function openRoute(no, co, dir, stype, dest) {
        showPage('details', 1);
        document.getElementById('details-title').innerText = no;
        const listEl = document.getElementById('details-list');
        
        listEl.innerHTML = `<div id="loading-indicator" class="status-text"><span class="status-icon bouncing">🚌</span>正在為你索取 ${no} 號巴士即時位置...</div>`;

        if(!map) {
            // 【修復 2：給定預設視角，防止 flyToBounds 崩潰】
            map = L.map('map', {zoomControl: false, attributionControl: false}).setView([22.3193, 114.1694], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        }
        mapMarkers.clearLayers();
        if(polyline) map.removeLayer(polyline);
        
        let pts = [];
        polyline = L.polyline([], {color: '#FFCC00', weight: 6, opacity: 0.9, lineCap: 'round', lineJoin: 'round'}).addTo(map);

        const fetchAndRenderBatches = async (stopList, fetchFn) => {
            let firstBatch = true;
            const batchSize = 6; 
            
            for (let i = 0; i < stopList.length; i += batchSize) {
                const batch = stopList.slice(i, i + batchSize);
                
                // 【修復 1：獨立攔截每個車站的錯誤，不會一死全死】
                const results = await Promise.all(batch.map(async (item) => {
                    try {
                        return await fetchFn(item);
                    } catch (err) {
                        return { name: '暫時無法讀取', lat: NaN, lng: NaN, eta: null };
                    }
                }));
                
                if (firstBatch) {
                    document.getElementById('loading-indicator')?.remove();
                    firstBatch = false;
                }
                
                results.forEach((s, idx) => {
                    const globalIdx = i + idx;
                    const e = formatEta(s.eta);
                    listEl.insertAdjacentHTML('beforeend', `
                        <div class="stop-container">
                            <div class="stop-name"><span style="color:var(--text-secondary); margin-right:8px; font-size:14px;">${globalIdx+1}</span> ${s.name}</div>
                            <div class="stop-eta ${e.isNear ? '' : 'far'}">${e.label}</div>
                        </div>
                    `);
                    if (!isNaN(s.lat) && !isNaN(s.lng)) {
                        pts.push([s.lat, s.lng]);
                        L.circleMarker([s.lat, s.lng], {radius: 5, color: '#FFFFFF', fillColor: '#FFCC00', fillOpacity: 1, weight: 2}).addTo(mapMarkers);
                    }
                });
                
                if (pts.length > 0) {
                    polyline.setLatLngs(pts);
                    mapMarkers.addTo(map);
                    try {
                        const bounds = polyline.getBounds();
                        if (bounds.isValid() && i === 0) {
                            map.flyToBounds(bounds, {padding: [40, 40], duration: 1, maxZoom: 15});
                        }
                    } catch(e) {}
                }
            }
            if (pts.length > 0) {
                try {
                    const bounds = polyline.getBounds();
                    if (bounds.isValid()) map.flyToBounds(bounds, {padding: [40, 40], duration: 1.2, maxZoom: 15});
                } catch(e){}
            }
        };

        try {
            if (co === 'KMB') {
                const s = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${no}/${dir === 'I'?'inbound':'outbound'}/${stype}`).then(r => r.json());
                const etas = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${no}/${stype}`).then(r => r.json());
                
                const stopList = s.data || [];
                if (stopList.length === 0) throw new Error('No stops data');

                await fetchAndRenderBatches(stopList, async (item) => {
                    const info = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${item.stop}`).then(r => r.json());
                    const validEta = etas.data ? etas.data.find(e => e.seq == item.seq && e.dir == dir && e.eta) : null;
                    return {
                        name: info?.data?.name_tc || '未知車站',
                        lat: info?.data?.lat || NaN,
                        lng: info?.data?.long || NaN,
                        eta: validEta?.eta 
                    };
                });
            } else if (co === 'CTB') {
                const routeStopRes = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${no}/${dir}`).then(r => r.json());
                const stopList = routeStopRes.data || [];
                if (stopList.length === 0) throw new Error('No stops data');
                
                const ctbDirEta = (dir === 'inbound' || dir === 'I') ? 'I' : 'O';
                
                await fetchAndRenderBatches(stopList, async (item) => {
                    const infoReq = fetch(`https://rt.data.gov.hk/v2/transport/citybus/stop/${item.stop}`).then(r => r.json());
                    const etaReq = fetch(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${item.stop}/${no}`).then(r => r.json());
                    const [info, etas] = await Promise.allSettled([infoReq, etaReq]);
                    
                    let etaStr = null;
                    if (etas.status === 'fulfilled' && etas.value.data) {
                        const validEta = etas.value.data.find(e => e.dir === ctbDirEta && e.seq === item.seq && e.eta);
                        if (validEta) etaStr = validEta.eta;
                    }
                    return {
                        name: info.status === 'fulfilled' ? (info.value.data?.name_tc || '未知車站') : '未知車站',
                        lat: info.status === 'fulfilled' ? (info.value.data?.lat || NaN) : NaN,
                        lng: info.status === 'fulfilled' ? (info.value.data?.long || NaN) : NaN,
                        eta: etaStr
                    };
                });
            }
        } catch(e) { 
            console.error(e);
            listEl.innerHTML = `<div class="status-text"><span class="status-icon">🥺</span>暫時未能獲取此路線的資料，請返回列表重試。</div>`; 
        }
    }

    function moveIndicator(idx) {
        const activeTab = document.getElementById('tab-' + idx);
        const ind = document.getElementById('nav-ind');
        if (!activeTab || !ind) return;
        
        const container = document.querySelector('.nav-tabs');
        const tabRect = activeTab.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        
        ind.style.left = ((tabRect.left - containerRect.left) + (tabRect.width / 2) - (ind.offsetWidth / 2)) + 'px';
    }

    function showPage(id, idx) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + idx).classList.add('active');
        
        currentIdx = idx;
        moveIndicator(idx);
        if (id === 'details' && map) setTimeout(() => map.invalidateSize(), 10);
    }

    window.addEventListener('resize', () => requestAnimationFrame(() => moveIndicator(currentIdx)));
    window.onload = init;
</script>
</body>
</html>
