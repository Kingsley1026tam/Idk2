<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HKBusEta</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="HKBus">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #F7F7F9; --surface-color: #FFFFFF; --text-primary: #1D1D1F; --text-secondary: #86868B;
            --brand-color: #FFCC00; --brand-light: rgba(255, 204, 0, 0.15); --brand-text: #1D1D1F;
            --border-soft: #F0F0F2; --nav-bg: #FFFFFF; --nav-icon: #A1A1A6;
            --safe-top: calc(env(safe-area-inset-top, 45px) + 20px); --safe-bottom: env(safe-area-inset-bottom, 24px);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --surface-color: #1E1E1E; --text-primary: #FFFFFF; --text-secondary: #98989D;
                --brand-color: #FFD60A; --brand-text: #FFFFFF; --border-soft: #2C2C2E; --nav-bg: #1E1E1E;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-primary); height: 100dvh; overflow: hidden; }

        .app-container { width: 100%; height: 100dvh; display: flex; flex-direction: column; position: relative; }
        .header-section { padding: var(--safe-top) 24px 16px 24px; z-index: 10; flex-shrink: 0; }
        .greeting { font-size: 15px; color: var(--text-secondary); font-weight: 500; margin-bottom: 4px; display: block; }
        .header-section h1 { font-size: 32px; font-weight: 700; margin-bottom: 20px; }
        
        .search-box { display: flex; align-items: center; background: var(--surface-color); border: 1px solid var(--border-soft); border-radius: 16px; padding: 12px 16px; transition: all 0.3s; }
        .search-box.kb-active { border-color: var(--brand-color) !important; border-width: 2px; box-shadow: 0 0 8px var(--brand-light); padding: 11px 15px; }
        .search-box svg { fill: var(--text-secondary); width: 20px; height: 20px; flex-shrink: 0; }
        .search-box input { flex: 1; border: none; background: transparent; font-size: 18px; color: var(--text-primary); outline: none; margin-left: 10px; font-weight: 600; cursor: pointer; }

        .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .page.active { display: flex; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .scrollable-content { flex: 1; overflow-y: auto; padding: 10px 24px calc(110px + var(--safe-bottom)) 24px; }
        .scrollable-content::-webkit-scrollbar { display: none; }

        .route-item { background: var(--surface-color); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 16px; margin-bottom: 12px; cursor: pointer; border: 1px solid var(--border-soft); }
        .route-item:active { transform: scale(0.97); }
        .route-badge { color: #fff; font-size: 18px; font-weight: 700; min-width: 60px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; padding: 0 8px; flex-shrink: 0; }
        .badge-kmb { background: linear-gradient(135deg, #E63946, #D0202E); }
        .badge-lwb { background: linear-gradient(135deg, #FFAA00, #F39800); }
        .badge-ctb { background: linear-gradient(135deg, #FFF64D, #FFF200); color: #00558e; border: 1px solid rgba(0,0,0,0.05); }
        
        .route-info { flex: 1; min-width: 0; }
        .route-dest { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .route-sub { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .eta-tag { background: var(--brand-color); color: var(--brand-text); padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 14px; min-width: 65px; text-align: center; }

        .back-bar { padding: calc(var(--safe-top) - 10px) 24px 15px; background: var(--bg-color); display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .back-btn { background: var(--surface-color); border: 1px solid var(--border-soft); color: var(--text-primary); font-size: 14px; padding: 8px 16px; border-radius: 16px; cursor: pointer; font-weight: 600;}
        
        #map { width: 100%; height: 28vh; border-radius: 0 0 24px 24px; flex-shrink: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.05); z-index: 10; }
        .stop-list-wrapper { flex: 1; overflow-y: auto; padding: 16px 24px calc(110px + var(--safe-bottom)); }

        .bottom-nav-wrapper { position: absolute; bottom: 0; left: 0; right: 0; height: calc(85px + var(--safe-bottom)); z-index: 1000; pointer-events: none; }
        .bottom-nav-wrapper.hide { transform: translateY(100%); transition: transform 0.3s ease; }
        .nav-bg-shape { position: absolute; bottom: 0; width: 100%; height: calc(75px + var(--safe-bottom)); background: var(--nav-bg); pointer-events: auto; border-top: 1px solid var(--border-soft); }
        .nav-tabs { position: absolute; top: 10px; left: 0; right: 0; height: 65px; display: flex; justify-content: space-around; align-items: center; z-index: 1010; pointer-events: auto; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: var(--nav-icon); }
        .nav-tab.active { color: var(--brand-text); }
        .nav-tab svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-tab span { font-size: 11px; font-weight: 500; margin-top: 4px; }

        .status-text { text-align: center; color: var(--text-secondary); padding: 40px 20px; font-size: 14px; line-height: 1.5; }
        
        /* Custom Keyboard */
        .custom-kb-overlay { position: fixed; bottom: -100%; left: 0; right: 0; background: #D1D5DB; padding: 8px 6px calc(8px + var(--safe-bottom)); z-index: 2000; transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        @media (prefers-color-scheme: dark) { .custom-kb-overlay { background: #2C2C2E; } }
        .custom-kb-overlay.show { bottom: 0; }
        .kb-body { display: flex; gap: 8px; }
        .kb-left { flex: 4; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .kb-right { flex: 3; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; overflow-y: auto; max-height: 218px; }
        .kb-key { background: #FFF; border-radius: 6px; font-size: 22px; height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 1px rgba(0,0,0,0.2); cursor: pointer; border: none; }
        @media (prefers-color-scheme: dark) { .kb-key { background: #48484A; color: #FFF; } }
        .kb-key.disabled { opacity: 0.2; pointer-events: none; }
        .kb-del { background: #BCC0C6; } .kb-zero { grid-column: span 2; background: #BCC0C6; }
        @media (prefers-color-scheme: dark) { .kb-zero, .kb-del { background: #636366; } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="page-home" class="page active">
        <div class="header-section">
            <span class="greeting" id="greeting-text">早晨</span>
            <h1>搜尋路線</h1>
            <div class="search-box" id="search-box-container" onclick="openKeyboard()">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="routeSearch" placeholder="輸入路線號碼" readonly>
            </div>
        </div>
        <div class="scrollable-content" id="main-list">
            <div class="status-text">載入資料中...</div>
        </div>
    </div>

    <div id="page-nearby" class="page">
        <div class="header-section"><h1>附近車站</h1></div>
        <div class="scrollable-content" id="nearby-list"></div>
    </div>

    <div id="page-details" class="page">
        <div class="back-bar">
            <button class="back-btn" onclick="showPage('home', 0)">返回</button>
            <div id="details-title" style="font-size:18px; font-weight:700;"></div>
            <div style="width:60px;"></div>
        </div>
        <div id="map"></div>
        <div class="stop-list-wrapper" id="details-list"></div>
    </div>

    <div class="bottom-nav-wrapper" id="bottom-nav">
        <div class="nav-bg-shape"></div>
        <div class="nav-tabs">
            <div class="nav-tab active" id="tab-0" onclick="showPage('home', 0)">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span>路線</span>
            </div>
            <div class="nav-tab" id="tab-1" onclick="executeNearbySearch()">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <span>附近</span>
            </div>
        </div>
    </div>

    <div class="custom-kb-overlay" id="customKb">
        <div style="display:flex; justify-content:flex-end; padding:4px 8px 8px;"><button style="color:#007AFF; font-weight:700; font-size:16px; background:none; border:none;" onclick="closeKeyboard()">完成</button></div>
        <div class="kb-body">
            <div class="kb-left" id="kb-num"></div>
            <div class="kb-right" id="kb-alpha"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let allRoutes = [], map, markers = [];

    async function init() {
        const h = new Date().getHours();
        document.getElementById('greeting-text').innerText = (h<12?"早晨":(h<18?"午安":"晚安"));
        initKeyboardUI();
        
        try {
            const [kmbRes, ctbRes] = await Promise.all([
                fetch('https://data.etabus.gov.hk/v1/transport/kmb/route/').then(r => r.json()),
                fetch('https://rt.data.gov.hk/v2/transport/citybus/route/ctb').then(r => r.json())
            ]);

            let routeMap = {};
            
            // 🐛 修復車站載入失敗：將 O/I 轉換為 outbound/inbound 以供車站 API 使用
            kmbRes.data.forEach(r => {
                let badge = r.route.match(/^[A|E|NA|R|S|X]/) ? 'badge-lwb' : 'badge-kmb';
                let apiDir = r.bound === 'O' ? 'outbound' : 'inbound'; // 關鍵修復點！
                routeMap[`${r.route}-${r.bound}-${r.service_type}`] = { 
                    no: r.route, dest: r.dest_tc, orig: r.orig_tc, co: 'KMB', badge: badge, dir: apiDir, stype: r.service_type 
                };
            });

            ctbRes.data.forEach(r => {
                routeMap[`${r.route}-O-CTB`] = { no: r.route, dest: r.dest_tc, orig: r.orig_tc, co: 'CTB', badge: 'badge-ctb', dir: 'outbound', stype: '1' };
            });

            allRoutes = Object.values(routeMap).sort((a, b) => a.no.localeCompare(b.no, undefined, { numeric: true }));
            renderList(allRoutes);
            updateKeyboardState();
        } catch(e) { document.getElementById('main-list').innerHTML = "無法載入路線資料"; }
    }

    function renderList(list) {
        const container = document.getElementById('main-list');
        if(!list.length) { container.innerHTML = `<div class="status-text">找不到相關路線</div>`; return; }
        container.innerHTML = list.slice(0, 100).map(r => `
            <div class="route-item" onclick="openRoute('${r.no}', '${r.co}', '${r.dir}', '${r.stype}')">
                <div class="route-badge ${r.badge}">${r.no}</div>
                <div class="route-info">
                    <div class="route-dest">往 ${r.dest}</div>
                    <div class="route-sub">${r.co} • 由 ${r.orig} 出發</div>
                </div>
            </div>`).join('');
    }

    // 🚀 加速版 + 修復版的車站詳情抓取
    async function openRoute(no, co, dir, stype) {
        showPage('details', 2);
        document.getElementById('details-title').innerText = `路線 ${no}`;
        const list = document.getElementById('details-list');
        list.innerHTML = `<div class="status-text">正在極速載入車站...</div>`;
        
        if (!map) {
            map = L.map('map', { zoomControl: false }).setView([22.3, 114.1], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }
        markers.forEach(m => map.removeLayer(m)); markers = [];

        try {
            // 這裡的 dir 已經在 init() 被轉換成了正確的 outbound 或 inbound
            let url = (co === 'KMB') ? 
                `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${no}/${dir}/${stype}` :
                `https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${no}/${dir}`;
            
            const stopRes = await fetch(url).then(r => r.json());
            
            // 使用 Promise.all 並發抓取車站名字，速度提升20倍，解決卡頓！
            const stopsData = await Promise.all(stopRes.data.map(async (s) => {
                try {
                    let infoUrl = (co === 'KMB') ? `https://data.etabus.gov.hk/v1/transport/kmb/stop/${s.stop}` : `https://rt.data.gov.hk/v2/transport/citybus/stop/${s.stop}`;
                    const info = await fetch(infoUrl).then(r => r.json());
                    return { seq: s.seq, stop: s.stop, name: info.data.name_tc, lat: info.data.lat, lng: info.data.long };
                } catch(e) { return { seq: s.seq, stop: s.stop, name: "未知車站", lat: 22.3, lng: 114.1 }; }
            }));

            let html = "";
            stopsData.forEach(s => {
                html += `
                <div class="route-item" onclick="getETA('${co}', '${s.stop}', '${no}', this)">
                    <div style="font-weight:700; color:var(--text-secondary); width:25px;">${s.seq}</div>
                    <div class="route-info"><div class="route-dest" style="font-size:16px;">${s.name}</div></div>
                    <div class="eta-tag">查閱</div>
                </div>`;
                let m = L.circleMarker([s.lat, s.lng], { radius: 6, color: '#E63946', fillOpacity: 1 }).addTo(map);
                markers.push(m);
            });
            
            list.innerHTML = html;
            if (markers.length) map.fitBounds(L.featureGroup(markers).getBounds(), { padding: [20, 20] });
        } catch(e) { list.innerHTML = `<div class="status-text">載入失敗，請重試。</div>`; }
    }

    async function getETA(co, stopId, no, el) {
        const badge = el.querySelector('.eta-tag');
        badge.innerText = "稍候...";
        try {
            let url = (co === 'KMB') ? `https://data.etabus.gov.hk/v1/transport/kmb/eta/${stopId}/${no}/1` : `https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${stopId}/${no}`;
            const res = await fetch(url).then(r => r.json());
            const first = res.data.filter(x => x.eta)[0];
            if (!first) { badge.innerText = "末班車"; return; }
            badge.innerText = Math.max(0, Math.round((new Date(first.eta) - new Date()) / 60000)) + " 分鐘";
        } catch(e) { badge.innerText = "N/A"; }
    }

    // 📍 修復「附近」功能：加入 GPS 定位與距離計算 (Haversine Formula)
    async function executeNearbySearch() {
        showPage('nearby', 1);
        const list = document.getElementById('nearby-list');
        list.innerHTML = `<div class="status-text">📡 正在獲取您的 GPS 位置...</div>`;
        
        if (!navigator.geolocation) {
            list.innerHTML = `<div class="status-text">您的裝置不支援定位功能。</div>`;
            return;
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude: lat, longitude: lng } = pos.coords;
            list.innerHTML = `<div class="status-text">📍 定位成功！正在搜尋附近車站...</div>`;
            
            try {
                // 獲取全港九巴車站
                const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop').then(r => r.json());
                let stops = res.data;
                
                // 計算每個車站與你的距離 (米)
                stops.forEach(s => {
                    const R = 6371e3; // 地球半徑 (米)
                    const φ1 = lat * Math.PI/180, φ2 = s.lat * Math.PI/180;
                    const Δφ = (s.lat-lat) * Math.PI/180, Δλ = (s.long-lng) * Math.PI/180;
                    const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
                    s.distance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                });

                // 按距離排序，只取最近的 20 個站
                stops.sort((a, b) => a.distance - b.distance);
                const nearbyStops = stops.slice(0, 20);

                list.innerHTML = nearbyStops.map(s => `
                    <div class="route-item" style="display:block;">
                        <div style="font-size:16px; font-weight:700;">${s.name_tc}</div>
                        <div style="color:var(--text-secondary); font-size:13px; margin-top:6px;">
                            🚶‍♂️ 距離約 ${Math.round(s.distance)} 米
                        </div>
                    </div>`).join('');
            } catch(e) {
                list.innerHTML = `<div class="status-text">獲取車站資料失敗</div>`;
            }
        }, (err) => {
            list.innerHTML = `<div class="status-text">無法獲取定位，請確認已允許瀏覽器讀取 GPS。</div>`;
        }, { enableHighAccuracy: true, timeout: 5000 });
    }

    // --- 鍵盤邏輯 ---
    function initKeyboardUI() {
        const numPad = document.getElementById('kb-num'), alphaPad = document.getElementById('kb-alpha');
        "123456789".split('').forEach(n => numPad.innerHTML += `<button class="kb-key" data-val="${n}">${n}</button>`);
        numPad.innerHTML += `<button class="kb-key kb-zero" data-val="0">0</button><button class="kb-key kb-del" data-val="del">←</button>`;
        "ABCDEFG HKMNPRST WXYZ".replace(/ /g,'').split('').forEach(l => alphaPad.innerHTML += `<button class="kb-key" data-val="${l}">${l}</button>`);

        document.querySelectorAll('.kb-key').forEach(k => {
            k.onclick = (e) => {
                e.stopPropagation();
                const input = document.getElementById('routeSearch');
                if (k.dataset.val === 'del') input.value = input.value.slice(0, -1);
                else input.value += k.dataset.val;
                renderList(allRoutes.filter(r => r.no.toUpperCase().includes(input.value.toUpperCase())));
                updateKeyboardState();
            }
        });
    }

    function updateKeyboardState() {
        const current = document.getElementById('routeSearch').value.toUpperCase();
        document.querySelectorAll('.kb-key').forEach(k => {
            if (k.dataset.val === 'del') { k.classList.toggle('disabled', current.length===0); return; }
            k.classList.toggle('disabled', !allRoutes.some(r => r.no.toUpperCase().includes(current + k.dataset.val)));
        });
    }

    function openKeyboard() {
        document.getElementById('customKb').classList.add('show');
        document.getElementById('bottom-nav').classList.add('hide');
        document.getElementById('search-box-container').classList.add('kb-active');
    }

    function closeKeyboard() {
        document.getElementById('customKb').classList.remove('show');
        document.getElementById('bottom-nav').classList.remove('hide');
        document.getElementById('search-box-container').classList.remove('kb-active');
    }

    function showPage(id, idx) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        if(idx < 2) document.getElementById('tab-' + idx).classList.add('active');
        if(id !== 'home') closeKeyboard();
    }

    window.onload = init;
</script>
</body>
</html>
