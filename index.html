<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Lite Cube Runner (Mobile Friendly)</title>
    <style>
        /* Basic styling to make the game full screen */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #87CEEB; /* Sky blue fallback */
            font-family: Arial, sans-serif; 
            /* Prevent text selection and accidental double-tap zooming on mobile */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #ui { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            color: white; 
            font-size: 24px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px #000; 
        }
        #game-over { 
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            font-size: 48px; 
            font-weight: bold;
            text-shadow: 2px 2px 4px #000; 
            text-align: center; 
        }
        #game-over button { 
            margin-top: 20px; 
            padding: 10px 20px; 
            font-size: 20px; 
            cursor: pointer; 
            background-color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        
        /* Mobile Controls Styling */
        #mobile-controls {
            display: none; /* Hidden on desktop by default */
            position: absolute;
            bottom: 30px;
            width: 100%;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            pointer-events: none; /* Lets clicks pass through the empty space */
        }
        
        .control-btn {
            width: 70px;
            height: 70px;
            font-size: 30px;
            background-color: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto; /* Re-enable clicks for the buttons */
            cursor: pointer;
        }
        
        .control-btn:active {
            background-color: rgba(255, 255, 255, 0.8);
            color: black;
        }

        /* Show mobile controls only on smaller screens */
        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    
    <div id="game-over">
        <div>GAME OVER</div>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <div id="mobile-controls">
        <div id="btn-left" class="control-btn">◀</div>
        <div id="btn-right" class="control-btn">▶</div>
    </div>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        // 2. Camera Setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8);
        camera.lookAt(0, 0, -10);

        // 3. Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB);
        document.body.appendChild(renderer.domElement);

        // 4. Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // 5. Create the Player
        const playerGeometry = new THREE.BoxGeometry(1, 1, 1);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.position.y = 0.5;
        scene.add(player);

        // 6. Create the Ground
        const groundGeometry = new THREE.PlaneGeometry(100, 200);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x555555 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 7. Game Variables
        let score = 0;
        let isGameOver = false;
        let obstacles = [];
        let speed = 0.2;
        const keys = { left: false, right: false };

        // 8. Input Handling (Keyboard)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
        });

        // 8b. Input Handling (Mobile Touch Controls)
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        // Helper function to handle both touch and mouse events on mobile buttons
        function setupTouchControl(element, keyProp) {
            // Touch events
            element.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyProp] = true; });
            element.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyProp] = false; });
            // Mouse events (helpful for testing mobile view on desktop browser)
            element.addEventListener('mousedown', (e) => { e.preventDefault(); keys[keyProp] = true; });
            element.addEventListener('mouseup', (e) => { e.preventDefault(); keys[keyProp] = false; });
            element.addEventListener('mouseleave', (e) => { e.preventDefault(); keys[keyProp] = false; });
        }

        setupTouchControl(btnLeft, 'left');
        setupTouchControl(btnRight, 'right');

        // 9. Obstacle Spawner Function
        function spawnObstacle() {
            if (isGameOver) return;
            
            const obsGeo = new THREE.BoxGeometry(1, 1, 1);
            const obsMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const obstacle = new THREE.Mesh(obsGeo, obsMat);
            
            obstacle.position.x = (Math.random() - 0.5) * 8;
            obstacle.position.y = 0.5;
            obstacle.position.z = -50;
            
            scene.add(obstacle);
            obstacles.push(obstacle);
            
            let spawnRate = Math.max(300, 1000 - score * 2);
            setTimeout(spawnObstacle, spawnRate);
        }
        spawnObstacle();

        // 10. Main Game Loop
        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            // Move Player smoothly
            if (keys.left && player.position.x > -4.5) player.position.x -= 0.15;
            if (keys.right && player.position.x < 4.5) player.position.x += 0.15;

            // Update Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.position.z += speed;

                // Simple Box Collision Detection
                if (
                    Math.abs(player.position.x - obs.position.x) < 0.9 &&
                    Math.abs(player.position.z - obs.position.z) < 0.9
                ) {
                    isGameOver = true;
                    document.getElementById('game-over').style.display = 'block';
                }

                // Remove passed obstacles
                if (obs.position.z > 10) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = score;
                    speed += 0.002;
                }
            }

            renderer.render(scene, camera);
        }
        
        animate();

        // 11. Handle Window Resizing properly
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
