<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro AI Chat</title>
    <style>
        /* Professional, fast-loading Dark Mode UI */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 500px; background: #1e1e2f; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; height: 80vh; }
        #chat-header { background: #2a2a40; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #333; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .user-msg { background: #007bff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: #383854; align-self: flex-start; border-bottom-left-radius: 4px; }
        #input-area { display: flex; padding: 15px; background: #2a2a40; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #121212; color: white; outline: none; font-size: 15px; }
        button { padding: 12px 20px; margin-left: 10px; border: none; border-radius: 8px; background: #007bff; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">⚡ High-Speed Pro AI</div>
        <div id="chat-box">
            <div class="message ai-msg">Hello! I am online. How can I help you?</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // ⚠️ DANGER: Never upload your real API key to a public GitHub repository!
        // Get a free key here: https://aistudio.google.com/app/apikey
        const API_KEY = 'REPLACE_THIS_WITH_YOUR_ACTUAL_API_KEY'; 

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value.trim();
            if (!text) return;

            // 1. Show user message
            appendMessage(text, 'user-msg');
            inputField.value = '';
            
            // 2. Show loading indicator
            const loadingMsg = appendMessage('Thinking...', 'ai-msg');

            try {
                // 3. Call the high-speed Gemini 1.5 Flash API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    loadingMsg.innerText = `Error: ${data.error.message}`;
                    return;
                }

                // 4. Update loading indicator with the real answer
                const aiText = data.candidates[0].content.parts[0].text;
                loadingMsg.innerText = aiText;
                
            } catch (error) {
                loadingMsg.innerText = "Error: Check your API Key or internet connection.";
            }
        }

        function appendMessage(text, className) {
            const box = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight; // Auto-scroll to bottom
            return msgDiv;
        }
    </script>
</body>
</html>
